const ctStatus=ct=>{const de=daysUntil(ct.e);if(de<0)return{st:'expired',label:'Истёк',color:'#c0392b',bg:'#fde8e8'};if(de<=7)return{st:'soon7',label:'Истекает через '+de+' дн.',color:'#c0392b',bg:'#fde8e8'};if(de<=14)return{st:'soon14',label:'Истекает через '+de+' дн.',color:'var(--acc-dk)',bg:'#fff5d0'};if(de<=30)return{st:'soon30',label:'Истекает через '+de+' дн.',color:'var(--acc-dk)',bg:'#fff5d0'};return{st:'active',label:'Действующий',color:'var(--pri)',bg:'#e0f5ee'}};
const instOverdue=ins=>!ins.paid&&daysUntil(ins.due)<0;
const instSoon=ins=>!ins.paid&&daysUntil(ins.due)>=0&&daysUntil(ins.due)<=7;
const pB=p=>p==='h'?'#fde8e8':p==='m'?'#fff5d0':'#e0f5ee';
const pC=p=>p==='h'?'#c0392b':p==='m'?'#b8860b':'var(--pri)';
const pN=p=>p==='h'?'Важно':p==='m'?'Средний':'Низкий';
const comC=(t,pr,v)=>t==='%'?Math.round(pr*v/100):(v||0);
const objIc=o=>o==='auto'?I.car:o==='realty'?I.house:I.heart;

/* Combo input — free text + dropdown suggestions */
function Combo({value,onChange,options,placeholder,style:s}){
  const[open,sOpen]=useState(false);const ref=useRef();
  const filtered=options.filter(o=>!value||o.toLowerCase().includes(value.toLowerCase()));
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))sOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
  return<div ref={ref} style={{position:'relative',...s}}>
    <input value={value} onChange={e=>{onChange(e.target.value);sOpen(true)}} onFocus={()=>sOpen(true)} placeholder={placeholder}/>
    {open&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#fff',border:'1px solid var(--brd)',borderRadius:'0 0 var(--rs) var(--rs)',boxShadow:'var(--sh-md)',maxHeight:210,overflowY:'auto'}}>
      {filtered.map(o=><div key={o} onClick={()=>{onChange(o);sOpen(false)}}
        onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
        onMouseLeave={e=>e.currentTarget.style.background=''}
        style={{padding:'8px 14px',fontSize:13,cursor:'pointer',color:o===value?'var(--pri)':'var(--tx)',fontWeight:o===value?700:400}}>{o}</div>)}
      <div style={{padding:'6px 14px',fontSize:11,color:'var(--tx3)',borderTop:'1px solid var(--brd-lt)',fontStyle:'italic'}}>
        {value&&!options.some(o=>o.toLowerCase()===value.toLowerCase())
          ? <span>Будет добавлено: <b style={{color:'var(--pri)'}}>{value}</b></span>
          : 'Введите своё значение или выберите из списка'}
      </div>
    </div>}
  </div>;
}

/* ═══ Calendar ═══ */
function Cal({tasks,cls,cts}){const td=new Date();const[yr,sY]=useState(td.getFullYear());const[mo,sM]=useState(td.getMonth());const[sel,sS]=useState(null);
  const prev=()=>{if(mo===0){sM(11);sY(yr-1)}else sM(mo-1);sS(null)};const next=()=>{if(mo===11){sM(0);sY(yr+1)}else sM(mo+1);sS(null)};
  const fd=new Date(yr,mo,1);const ld=new Date(yr,mo+1,0);const sd=(fd.getDay()+6)%7;const dim=ld.getDate();
  const evs=useMemo(()=>{const ev={};const add=(d,it)=>{if(!ev[d])ev[d]=[];ev[d].push(it)};

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>

/* ═══ Export ═══ */
function expCSV(cls,cts){const h="ФИО;Телефон;Email;СК;Номер;Тип;Начало;Конец;Объект;Премия;КВ%;КВ₽;Примечание\n";const r=cts.map(ct=>{const c=cls.find(x=>x.id===ct.cid);return`${c?c.n:''};${c?c.ph:''};${c?c.em:''};${ct.co};${ct.num};${ct.tp};${fD(ct.s)};${fD(ct.e)};${ct.obj};${ct.pr};${ct.comT==='%'?ct.comV:''};${comC(ct.comT,ct.pr,ct.comV)};${ct.nt}`}).join("\n");const blob=new Blob(["\uFEFF"+h+r],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download="agentsfera_export.csv";a.click();URL.revokeObjectURL(url)}

/* ═══ CRM ═══ */
function Crm({onOut,userName}){
  /* localStorage helpers */
  const DATA_VER='v9';
  const ls=(k,d)=>{try{if(localStorage.getItem('as_ver')!==DATA_VER)return d;const v=localStorage.getItem('as_'+k);return v?JSON.parse(v):d}catch(e){return d}};
  const sv=(k,v)=>{try{localStorage.setItem('as_ver',DATA_VER);localStorage.setItem('as_'+k,JSON.stringify(v))}catch(e){}};

  const[pg,sPg]=useState('dash');const[cls,sCl]=useState(()=>ls('cls',INIT_CL));const[cts,sCt]=useState(()=>ls('cts',INIT_CT));const[tks,sTk]=useState(()=>ls('tks',INIT_TK));const[acts,sActs]=useState(()=>ls('acts',INIT_ACTS));
  const[q,sQ]=useState('');const[ft,sFt]=useState('');const[fc,sFc]=useState('');const[fo,sFo]=useState('');
  const[sel,sSel]=useState(null);const[sf,sSf]=useState(false);const[sb,sSb]=useState(true);const[toast,sToast]=useState(null);
  const[clSort,sClSort]=useState('name');const[gSearch,sGSearch]=useState('');
  const[mCF,sMCF]=useState(false);const[eCl,sECl]=useState(null);const[mCtF,sMCtF]=useState(false);const[eCt,sECt]=useState(null);const[ctCid,sCtCid]=useState(null);
  const[mTF,sMTF]=useState(false);const[eTk,sETk]=useState(null);const[conf,sConf]=useState(null);const[tkFlt,sTkFlt]=useState('');
  const[quickNewCl,sQuickNewCl]=useState(false);
  const[ctSort,sCtSort]=useState({col:'e',dir:'asc'});const[ctFltCo,sCtFltCo]=useState('');const[ctFltTp,sCtFltTp]=useState('');const[ctFltObj,sCtFltObj]=useState('');const[ctFltSt,sCtFltSt]=useState('');const[ctQ,sCtQ]=useState('');const[ctFltCtSt,sCtFltCtSt]=useState('');
  const[dashPer,sDashPer]=useState('all');
  const[notes,sNotes]=useState(()=>ls('notes',{}));
  const[dashExp,sDashExp]=useState({});
  const show=m=>sToast(m);

  /* Persist to localStorage */
  useEffect(()=>sv('cls',cls),[cls]);
  useEffect(()=>sv('cts',cts),[cts]);
  useEffect(()=>sv('tks',tks),[tks]);
  useEffect(()=>sv('acts',acts),[acts]);
  useEffect(()=>sv('notes',notes),[notes]);

  const addNote=(cid,text)=>{const n={...notes};if(!n[cid])n[cid]=[];n[cid]=[{id:gid(),text,date:new Date().toISOString().slice(0,10)},...n[cid]];sNotes(n)};
  const cos=useMemo(()=>[...new Set(cts.map(c=>c.co))].sort(),[cts]);const tps=useMemo(()=>[...new Set(cts.map(c=>c.tp))].sort(),[cts]);
  const fCls=useMemo(()=>{
    let res=cls.filter(c=>{const s=q.toLowerCase();const cc=cts.filter(ct=>ct.cid===c.id);return(!q||c.n.toLowerCase().includes(s)||c.ph.includes(s)||c.em.toLowerCase().includes(s)||cc.some(ct=>ct.num.toLowerCase().includes(s)||(ct.od.pl||'').toLowerCase().includes(s)||(ct.od.car||'').toLowerCase().includes(s)))&&(!ft||cc.some(ct=>ct.tp===ft))&&(!fc||cc.some(ct=>ct.co===fc))&&(!fo||cc.some(ct=>ct.obj===fo))});
    if(clSort==='prem')res=[...res].sort((a,b)=>{const pa=cts.filter(ct=>ct.cid===a.id).reduce((s,c)=>s+c.pr,0);const pb=cts.filter(ct=>ct.cid===b.id).reduce((s,c)=>s+c.pr,0);return pb-pa});
    else if(clSort==='kv')res=[...res].sort((a,b)=>{const ka=cts.filter(ct=>ct.cid===a.id).reduce((s,c)=>s+comC(c.comT,c.pr,c.comV),0);const kb=cts.filter(ct=>ct.cid===b.id).reduce((s,c)=>s+comC(c.comT,c.pr,c.comV),0);return kb-ka});
    else if(clSort==='cnt')res=[...res].sort((a,b)=>cts.filter(ct=>ct.cid===b.id).length-cts.filter(ct=>ct.cid===a.id).length);
    else res=[...res].sort((a,b)=>a.n.localeCompare(b.n));
    return res;
  },[cls,cts,q,ft,fc,fo,clSort]);
  const stats=useMemo(()=>{
    /* period filter */
    const now=new Date();let pStart=null;
    if(dashPer==='month'){pStart=new Date(now.getFullYear(),now.getMonth(),1)}
    else if(dashPer==='quarter'){const q=Math.floor(now.getMonth()/3)*3;pStart=new Date(now.getFullYear(),q,1)}
    else if(dashPer==='year'){pStart=new Date(now.getFullYear(),0,1)}
    const pCts=pStart?cts.filter(ct=>{const d=new Date(ct.s);return d>=pStart}):cts;

    const tp=pCts.reduce((a,c)=>a+c.pr,0);const tc=pCts.reduce((a,c)=>a+comC(c.comT,c.pr,c.comV),0);const byCo={};pCts.forEach(c=>{if(!byCo[c.co])byCo[c.co]={p:0,c:0,n:0};byCo[c.co].p+=c.pr;byCo[c.co].c+=comC(c.comT,c.pr,c.comV);byCo[c.co].n++});const byTp={};pCts.forEach(c=>{if(!byTp[c.tp])byTp[c.tp]={p:0,n:0};byTp[c.tp].p+=c.pr;byTp[c.tp].n++});
    /* avg + renewal */
    const avgPrem=pCts.length?Math.round(tp/pCts.length):0;

    const expiredAll=cts.filter(ct=>daysUntil(ct.e)<0);

        <select value={fc} onChange={e=>sFc(e.target.value)} style={{width:'auto',minWidth:120}}><option value="">Все СК</option>{cos.map(c=><option key={c}>{c}</option>)}</select>
        <select value={fo} onChange={e=>sFo(e.target.value)} style={{width:'auto',minWidth:140}}><option value="">Все объекты</option>{OT.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
        <select value={clSort} onChange={e=>sClSort(e.target.value)} style={{width:'auto',minWidth:130}}><option value="name">По имени</option><option value="prem">По премии</option><option value="kv">По КВ</option><option value="cnt">По кол-ву дог.</option></select>
        {(ft||fc||fo)&&<Btn small danger onClick={()=>{sFt('');sFc('');sFo('')}}>Сбросить</Btn>}
      </Cd>}
      {!fCls.length&&<Cd style={{textAlign:'center',padding:40}}><div style={{color:'var(--sec)',marginBottom:8}}>{I.users}</div><p style={{color:'var(--tx2)',fontFamily:"'Tenor Sans',serif",fontSize:15}}>Нет клиентов</p><p style={{color:'var(--tx3)',fontSize:12,marginBottom:14}}>Добавьте первого клиента чтобы начать работу</p><Btn primary onClick={()=>{sECl(null);sMCF(true)}} icon={I.plus}>Добавить клиента</Btn></Cd>}
      {fCls.map(c=>{const cc=cts.filter(ct=>ct.cid===c.id);const tp=cc.reduce((a,ct)=>a+ct.pr,0);const stLbl=c.status==='potential'?'Потенциальный':c.status==='inactive'?'Неактивный':'';const stClr=c.status==='potential'?'var(--acc-dk)':c.status==='inactive'?'var(--tx3)':'';
        return<Cd key={c.id} style={{marginBottom:8,padding:14,cursor:'pointer',opacity:c.status==='inactive'?0.6:1}} onClick={()=>{sSel(c);sPg('card')}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:12,background:c.status==='potential'?'var(--acc-dk)':c.status==='inactive'?'var(--tx3)':'var(--pri)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16,fontWeight:700,flexShrink:0,fontFamily:"'Tenor Sans',serif"}}>{c.n[0]}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{c.n}{stLbl&&<span style={{fontSize:10,fontWeight:600,color:stClr,marginLeft:8,background:stClr+'18',padding:'1px 6px',borderRadius:4}}>{stLbl}</span>}</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{cc.slice(0,3).map(ct=><Tag key={ct.id} text={ct.co+' · '+ct.tp}/>)}{cc.length>3&&<Tag text={`+${cc.length-3}`} bg="var(--bg)" color="var(--tx3)"/>}</div></div>
            <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:15,fontWeight:900,color:'var(--pri)'}}>{fM(tp)}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{cc.length} дог.</div></div>
          </div></Cd>})}
      <div style={{padding:10,color:'var(--tx3)',fontSize:12}}>Показано {fCls.length} из {cls.length}</div>
    </div>}

    {pg==='card'&&sel&&(()=>{const cc=cts.filter(ct=>ct.cid===sel.id);const ct2=tks.filter(t=>t.cid===sel.id);
      return<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <button onClick={()=>{sPg('cli');sSel(null)}} style={{background:'none',border:'none',color:'var(--tx2)',cursor:'pointer',fontSize:13,fontFamily:'inherit',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>{I.chL} Назад</button>
          <div style={{display:'flex',gap:6}}><Btn small ghost onClick={()=>{sECl(sel);sMCF(true)}} icon={I.edit}>Изменить</Btn><Btn small danger onClick={()=>sConf({tp:'cl',id:sel.id,nm:sel.n})} icon={I.trash}>Удалить</Btn></div>
        </div>
        <Cd style={{marginBottom:14}}>
          <div style={{display:'flex',gap:14,alignItems:'center'}}>

            <div style={{flex:1}}><h2 style={{fontSize:20,marginBottom:5}}>{sel.n}</h2>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:12,color:'var(--tx2)',alignItems:'center'}}>
                {sel.ph&&<a href={'tel:'+sel.ph.replace(/[^\d+]/g,'')} style={{display:'flex',alignItems:'center',gap:3,color:'var(--sec)',textDecoration:'none',fontWeight:600}}>{I.phone} {sel.ph}</a>}
                {sel.em&&<a href={'mailto:'+sel.em} style={{display:'flex',alignItems:'center',gap:3,color:'var(--tx2)',textDecoration:'none'}}>{I.mail} {sel.em}</a>}
                {sel.bday&&<span style={{display:'flex',alignItems:'center',gap:3}}>{I.cake} {fD(sel.bday)}</span>}
                {sel.pf&&<Tag text={sel.pf}/>}

          {sel.nt&&<div style={{marginTop:12,padding:10,background:'var(--bg)',borderRadius:8,fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:6}}>{I.note} {sel.nt}</div>}
          <div style={{marginTop:8,padding:12,background:sel.link?'rgba(60,168,168,.06)':'var(--bg)',borderRadius:8,fontSize:12,display:'flex',alignItems:'center',justifyContent:'space-between',border:'1px solid var(--brd-lt)'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{color:'var(--sec)',display:'flex'}}>{I.doc}</span>
              {sel.link
                ? <a href={sel.link} target="_blank" rel="noopener" style={{color:'var(--sec)',fontWeight:600,textDecoration:'none',borderBottom:'1px dashed var(--sec)'}}>Документы клиента</a>
                : <span style={{color:'var(--tx3)'}}>Нет ссылки на документы</span>
              }
            </div>
            <Btn small ghost onClick={()=>{sECl(sel);sMCF(true)}} icon={I.edit}>{sel.link?'Изменить':'Добавить'}</Btn>
          </div>
        </Cd>

        {/* Client totals summary */}
        {cc.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:14}}>
          <div style={{background:'var(--card)',border:'1px solid var(--brd-lt)',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--acc-dk)'}}>{fM(cc.reduce((a,ct)=>a+ct.pr,0))}</div><div style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Общая премия</div></div>
          <div style={{background:'var(--card)',border:'1px solid var(--brd-lt)',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--pri)'}}>{fM(cc.reduce((a,ct)=>a+comC(ct.comT,ct.pr,ct.comV),0))}</div><div style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Общая КВ</div></div>
          <div style={{background:'var(--card)',border:'1px solid var(--brd-lt)',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:'var(--sec)'}}>{cc.flatMap(ct=>ct.inst).filter(i=>i.paid).length} / {cc.flatMap(ct=>ct.inst).length}</div><div style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Взносов оплачено</div></div>
          <div style={{background:'var(--card)',border:'1px solid var(--brd-lt)',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:18,fontWeight:900,color:cc.filter(ct=>ctStatus(ct).st==='active').length===cc.length?'var(--pri)':'#c0392b'}}>{cc.filter(ct=>ctStatus(ct).st==='active').length} / {cc.length}</div><div style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Активных</div></div>
        </div>}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><h3 style={{fontSize:16}}>Договоры ({cc.length})</h3><Btn small primary onClick={()=>{sECt(null);sCtCid(sel.id);sMCtF(true)}} icon={I.plus}>Договор</Btn></div>
        {!cc.length&&<Cd style={{textAlign:'center',padding:30}}><div style={{color:'var(--sec)',marginBottom:8}}>{I.doc}</div><p style={{color:'var(--tx2)',fontSize:13}}>У клиента нет договоров</p><p style={{color:'var(--tx3)',fontSize:11,marginBottom:12}}>Добавьте первый договор</p><Btn small primary onClick={()=>{sECt(null);sCtCid(sel.id);sMCtF(true)}} icon={I.plus}>Добавить договор</Btn></Cd>}
        {cc.map(ct=><Cd key={ct.id} style={{marginBottom:10,padding:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div><div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}><span style={{color:'var(--sec)',display:'flex'}}>{objIc(ct.obj)}</span><span style={{fontSize:14,fontWeight:700}}>{ct.co} — {ct.tp}</span>
              {(()=>{const s=ctStatus(ct);return<span style={{padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700,background:s.bg,color:s.color,marginLeft:6}}>{s.label}</span>})()}
            </div>
              <div style={{fontSize:11,color:'var(--tx3)',fontFamily:'monospace'}}>{ct.num}</div></div>
            <div style={{display:'flex',gap:4}}><button onClick={()=>{sECt(ct);sCtCid(sel.id);sMCtF(true)}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',display:'flex'}}>{I.edit}</button><button onClick={()=>sConf({tp:'ct',id:ct.id,nm:`${ct.co} ${ct.num}`})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',display:'flex'}}>{I.trash}</button></div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,fontSize:12,marginBottom:ct.inst.length?10:0}}>
            <div><span style={{color:'var(--tx3)'}}>Период: </span><span style={{fontWeight:700}}>{fD(ct.s)} — {fD(ct.e)}</span></div>
            <div><span style={{color:'var(--tx3)'}}>Премия: </span><span style={{fontWeight:900,color:'var(--acc-dk)'}}>{fM(ct.pr)}</span></div>
            <div><span style={{color:'var(--tx3)'}}>КВ: </span><span style={{fontWeight:900,color:'var(--pri)'}}>{ct.comT==='%'?`${ct.comV}%=`:''}{fM(comC(ct.comT,ct.pr,ct.comV))}</span></div>
          </div>
          {ct.obj==='auto'&&ct.od.car&&<div style={{fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:4,marginBottom:ct.inst.length?8:0}}>{I.car} {ct.od.car} {ct.od.pl&&<span style={{fontFamily:'monospace',marginLeft:4}}>{ct.od.pl}</span>}</div>}
          {ct.obj==='realty'&&ct.od.addr&&<div style={{fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:4,marginBottom:ct.inst.length?8:0}}>{I.house} {ct.od.rtype} — {ct.od.addr} {ct.od.area&&`(${ct.od.area}м²)`}</div>}
          {ct.obj==='life'&&ct.od.insured&&<div style={{fontSize:12,color:'var(--tx2)',display:'flex',alignItems:'center',gap:4,marginBottom:ct.inst.length?8:0}}>{I.heart} {ct.od.insured}, {ct.od.age} лет, {fM(ct.od.sum)}</div>}
          {ct.inst.length>0&&<div style={{background:'var(--bg)',borderRadius:8,padding:10}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--tx3)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Взносы</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{ct.inst.map((ins,ii)=>{const od=instOverdue(ins);const sn=instSoon(ins);return<div key={ins.id} onClick={()=>{const ni=[...ct.inst];ni[ii]={...ni[ii],paid:!ni[ii].paid};sCt(cts.map(x=>x.id===ct.id?{...x,inst:ni}:x))}} style={{padding:'6px 10px',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',background:ins.paid?'#e0f5ee':od?'#fde8e8':sn?'#fff5d0':'var(--bg)',color:ins.paid?'var(--pri)':od?'#c0392b':sn?'var(--acc-dk)':'var(--tx2)',border:'1px solid '+(ins.paid?'#b8e4d0':od?'#f5c4c4':sn?'#ffe8a0':'var(--brd-lt)')}}>{ins.paid?'Оплачен':od?'Просрочен':sn?'Скоро':'Ожидание'}: {fM(ins.amt)}, {fD(ins.due)}{od&&!ins.paid?` (${-daysUntil(ins.due)} дн.)`:''}</div>})}</div>
          </div>}
          {ct.nt&&<div style={{fontSize:11,color:'var(--tx2)',marginTop:6,display:'flex',alignItems:'center',gap:4}}>{I.note} {ct.nt}</div>}
          <div style={{fontSize:11,marginTop:4,display:'flex',alignItems:'center',gap:4}}>
            <span style={{color:'var(--sec)',display:'flex'}}>{I.doc}</span>
            {ct.link
              ? <a href={ct.link} target="_blank" rel="noopener" style={{color:'var(--sec)',fontWeight:600,textDecoration:'none',borderBottom:'1px dashed var(--sec)'}}>Документы договора</a>
              : <span style={{color:'var(--tx3)'}}>Нет ссылки</span>
            }
          </div>
        </Cd>)}
        <Sep/>
        {/* Notes / History */}
        <div style={{marginBottom:16}}>
          <h3 style={{fontSize:16,marginBottom:10}}>Заметки и история</h3>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input id="noteInput" placeholder="Добавить заметку — звонок, встреча, договорённость..." style={{flex:1}} onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){addNote(sel.id,e.target.value.trim());e.target.value=''}}}/>
            <Btn small primary onClick={()=>{const inp=document.getElementById('noteInput');if(inp.value.trim()){addNote(sel.id,inp.value.trim());inp.value=''}}}>Добавить</Btn>
          </div>
          {(notes[sel.id]||[]).length===0?<p style={{color:'var(--tx3)',fontSize:12,padding:4}}>Нет заметок</p>:

              <button onClick={()=>{const n={...notes};n[sel.id]=n[sel.id].filter(x=>x.id!==nt.id);sNotes(n)}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',display:'flex',padding:2,flexShrink:0}}>{I.trash}</button>
            </div>)
          }
        </div>
        <Sep/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><h3 style={{fontSize:16}}>Задачи ({ct2.length})</h3><Btn small ghost onClick={()=>{sETk(null);sMTF(true)}} icon={I.plus}>Задача</Btn></div>
        {!ct2.length?<p style={{color:'var(--tx3)',fontSize:12,padding:8}}>Нет задач</p>:

            <span style={{fontSize:12,textDecoration:t.dn?'line-through':'none',color:t.dn?'var(--tx3)':'var(--tx)',flex:1}}>{t.t}</span>
            <span style={{fontSize:10,color:'var(--tx3)',fontFamily:'monospace'}}>{fD(t.d)}</span>
            <Tag text={pN(t.p)} bg={pB(t.p)} color={pC(t.p)}/>
          </div>)}
      </div>})()}

    {/* Contracts Table */}
    {pg==='ctg'&&(()=>{
      /* reconciliation status from acts */
      const getActSt=(ct)=>{
        for(const a of acts){for(const it of a.items){if(it.num&&ct.num&&it.num.toLowerCase()===ct.num.toLowerCase()){return it.st==='ok'?{st:'ok',fact:it.act}:it.st==='diff'?{st:'diff',fact:it.act}:{st:'unk',fact:0}}}}return{st:'none',fact:0}};

      /* filter */
      const sq=ctQ.toLowerCase();
      let fcts=cts.filter(ct=>{
        const cl=cls.find(c=>c.id===ct.cid);const clN=cl?cl.n.toLowerCase():'';
        const mq=!ctQ||clN.includes(sq)||ct.num.toLowerCase().includes(sq)||ct.co.toLowerCase().includes(sq)||(ct.od.pl||'').toLowerCase().includes(sq)||(ct.od.car||'').toLowerCase().includes(sq);
        const as=getActSt(ct);
        const cs=ctStatus(ct);
        const mCtSt=!ctFltCtSt||(ctFltCtSt==='active'&&cs.st==='active')||(ctFltCtSt==='soon'&&(cs.st==='soon7'||cs.st==='soon14'||cs.st==='soon30'))||(ctFltCtSt==='expired'&&cs.st==='expired');
        return mq&&(!ctFltCo||ct.co===ctFltCo)&&(!ctFltTp||ct.tp===ctFltTp)&&(!ctFltObj||ct.obj===ctFltObj)&&(!ctFltSt||as.st===ctFltSt)&&mCtSt;
      });

      /* sort */
      const sc=ctSort.col;const sd=ctSort.dir==='asc'?1:-1;
      fcts=[...fcts].sort((a,b)=>{
        const ca=cls.find(c=>c.id===a.cid);const cb=cls.find(c=>c.id===b.cid);
        let va,vb;
        if(sc==='client'){va=(ca?ca.n:'').toLowerCase();vb=(cb?cb.n:'').toLowerCase()}
        else if(sc==='co'){va=a.co.toLowerCase();vb=b.co.toLowerCase()}
        else if(sc==='tp'){va=a.tp.toLowerCase();vb=b.tp.toLowerCase()}
        else if(sc==='num'){va=a.num.toLowerCase();vb=b.num.toLowerCase()}
        else if(sc==='s'){va=a.s;vb=b.s}
        else if(sc==='e'){va=a.e;vb=b.e}
        else if(sc==='ctst'){va=daysUntil(a.e);vb=daysUntil(b.e)}
        else if(sc==='pr'){va=a.pr;vb=b.pr}
        else if(sc==='kv'){va=comC(a.comT,a.pr,a.comV);vb=comC(b.comT,b.pr,b.comV)}
        else if(sc==='obj'){va=a.obj;vb=b.obj}
        else if(sc==='inst'){va=a.inst.filter(i=>i.paid).length;vb=b.inst.filter(i=>i.paid).length}
        else{va=0;vb=0}
        if(va<vb)return -sd;if(va>vb)return sd;return 0;
      });

      const toggleSort=(col)=>{
        if(ctSort.col===col)sCtSort({col,dir:ctSort.dir==='asc'?'desc':'asc'});
        else sCtSort({col,dir:'asc'});
      };
      const sortIcon=(col)=>ctSort.col===col?(ctSort.dir==='asc'?I.sortAsc:I.sortDesc):I.sortNone;

      /* totals */
      const totPr=fcts.reduce((a,c)=>a+c.pr,0);
      const totKv=fcts.reduce((a,c)=>a+comC(c.comT,c.pr,c.comV),0);
      const totFact=fcts.reduce((a,c)=>a+getActSt(c).fact,0);
      const totInst=fcts.reduce((a,c)=>a+c.inst.length,0);
      const totPaid=fcts.reduce((a,c)=>a+c.inst.filter(i=>i.paid).length,0);

      const stLabel={ok:'Сверено',diff:'Расхождение',unk:'Не найден',none:'Не проверен'};
      const stColor={ok:'var(--pri)',diff:'#c0392b',unk:'var(--acc-dk)',none:'var(--tx3)'};
      const stBg={ok:'#e0f5ee',diff:'#fde8e8',unk:'#fff5d0',none:'var(--bg)'};
      const stIc={ok:I.okCircle,diff:I.alertCircle,unk:I.minusCircle,none:I.minusCircle};

      const thSt={padding:'10px 10px',textAlign:'left',fontWeight:700,color:'var(--tx2)',borderBottom:'2px solid var(--brd)',whiteSpace:'nowrap',cursor:'pointer',userSelect:'none',fontSize:11,textTransform:'uppercase',letterSpacing:'.04em'};

      return<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <h1 style={{fontSize:22}}>Договоры</h1>
          <div style={{display:'flex',gap:6}}>
            <Btn ghost onClick={()=>expCSV(cls,cts)} icon={I.dl}>Экспорт</Btn>
            <Btn primary onClick={()=>{sECt(null);sCtCid(null);sMCtF(true)}} icon={I.plus}>Договор</Btn>
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:200,position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)',display:'flex'}}>{I.search}</span><input value={ctQ} onChange={e=>sCtQ(e.target.value)} placeholder="Поиск по клиенту, номеру, СК, госномеру..." style={{paddingLeft:36}}/></div>
          <select value={ctFltCo} onChange={e=>sCtFltCo(e.target.value)} style={{width:'auto',minWidth:110}}><option value="">Все СК</option>{cos.map(c=><option key={c}>{c}</option>)}</select>
          <select value={ctFltTp} onChange={e=>sCtFltTp(e.target.value)} style={{width:'auto',minWidth:110}}><option value="">Все типы</option>{tps.map(t=><option key={t}>{t}</option>)}</select>
          <select value={ctFltObj} onChange={e=>sCtFltObj(e.target.value)} style={{width:'auto',minWidth:130}}><option value="">Все объекты</option>{OT.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
          <select value={ctFltSt} onChange={e=>sCtFltSt(e.target.value)} style={{width:'auto',minWidth:130}}><option value="">Все статусы сверки</option><option value="ok">Сверено</option><option value="diff">Расхождение</option><option value="none">Не проверен</option></select>
          <select value={ctFltCtSt||''} onChange={e=>sCtFltCtSt(e.target.value)} style={{width:'auto',minWidth:130}}><option value="">Все статусы</option><option value="active">Действующий</option><option value="soon">Истекает скоро</option><option value="expired">Истёкший</option></select>
          {(ctFltCo||ctFltTp||ctFltObj||ctFltSt||ctQ||ctFltCtSt)&&<Btn small danger onClick={()=>{sCtFltCo('');sCtFltTp('');sCtFltObj('');sCtFltSt('');sCtQ('');sCtFltCtSt('')}}>Сбросить</Btn>}
        </div>

        <Cd style={{padding:0,overflow:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr>
              {[['client','Клиент'],['co','СК'],['tp','Тип'],['num','Номер'],['obj','Объект'],['s','Начало'],['e','Конец'],['ctst','Статус'],['pr','Премия'],['kv','КВ ожид.'],['fact','КВ факт'],['inst','Взносы'],['status','Сверка']].map(([col,label])=>(
                <th key={col} onClick={()=>col!=='fact'&&col!=='status'&&toggleSort(col)} style={{...thSt,cursor:(col==='fact'||col==='status')?'default':'pointer'}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:3}}>{label} {col!=='fact'&&col!=='status'&&sortIcon(col)}</span>
                </th>
              ))}
            </tr></thead>
            <tbody>
              {fcts.map(ct=>{
                const cl=cls.find(c=>c.id===ct.cid);
                const as=getActSt(ct);
                const kvExp=comC(ct.comT,ct.pr,ct.comV);
                const paidCnt=ct.inst.filter(i=>i.paid).length;
                return<tr key={ct.id} style={{borderBottom:'1px solid var(--brd-lt)',transition:'background .1s',cursor:'pointer'}}
                  onClick={()=>{if(cl){sSel(cl);sPg('card')}}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={{padding:'10px 10px',fontWeight:700,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cl?cl.n:'—'}</td>
                  <td style={{padding:'10px 10px'}}><Tag text={ct.co}/></td>
                  <td style={{padding:'10px 10px'}}>{ct.tp}</td>
                  <td style={{padding:'10px 10px',fontFamily:'monospace',fontSize:11}}>{ct.num}</td>
                  <td style={{padding:'10px 10px',color:'var(--sec)',display:'flex',alignItems:'center',gap:3}}>{objIc(ct.obj)} <span style={{color:'var(--tx)'}}>{ct.obj==='auto'?(ct.od.car||'—'):ct.obj==='realty'?(ct.od.rtype||'—'):'Жизнь'}</span></td>
                  <td style={{padding:'10px 10px',fontFamily:'monospace'}}>{fD(ct.s)}</td>
                  <td style={{padding:'10px 10px',fontFamily:'monospace'}}>{fD(ct.e)}</td>
                  {(()=>{const s=ctStatus(ct);return<td style={{padding:'10px 10px'}}><span style={{padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700,background:s.bg,color:s.color}}>{s.label}</span></td>})()}
                  <td style={{padding:'10px 10px',fontWeight:900,color:'var(--acc-dk)',fontFamily:'monospace'}}>{fM(ct.pr)}</td>
                  <td style={{padding:'10px 10px',fontWeight:700,color:'var(--pri)',fontFamily:'monospace'}}>{fM(kvExp)}</td>
                  <td style={{padding:'10px 10px',fontFamily:'monospace',color:as.fact?'var(--pri)':'var(--tx3)'}}>{as.fact?fM(as.fact):'—'}</td>
                  <td style={{padding:'10px 10px'}}>{ct.inst.length>0?<span style={{fontWeight:600}}>{paidCnt}/{ct.inst.length}</span>:'—'}</td>
                  <td style={{padding:'10px 10px'}}><span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:5,fontSize:11,fontWeight:600,background:stBg[as.st],color:stColor[as.st]}}>{stIc[as.st]} {stLabel[as.st]}</span></td>
                </tr>
              })}
            </tbody>
            <tfoot>
              <tr style={{borderTop:'2px solid var(--brd)',background:'var(--bg)'}}>
                <td style={{padding:'12px 10px',fontWeight:900,fontSize:13}} colSpan={2}>Итого: {fcts.length} договоров</td>
                <td colSpan={6}></td>
                <td style={{padding:'12px 10px',fontWeight:900,color:'var(--acc-dk)',fontFamily:'monospace',fontSize:13}}>{fM(totPr)}</td>
                <td style={{padding:'12px 10px',fontWeight:900,color:'var(--pri)',fontFamily:'monospace',fontSize:13}}>{fM(totKv)}</td>
                <td style={{padding:'12px 10px',fontWeight:700,color:'var(--pri)',fontFamily:'monospace',fontSize:12}}>{totFact?fM(totFact):'—'}</td>
                <td style={{padding:'12px 10px',fontWeight:700,fontSize:12}}>{totPaid}/{totInst}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </Cd>
        <div style={{padding:10,color:'var(--tx3)',fontSize:12}}>Показано {fcts.length} из {cts.length} договоров</div>
      </div>})()}

    {pg==='tsk'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><h1 style={{fontSize:22}}>Задачи</h1><Btn primary onClick={()=>{sETk(null);sMTF(true)}} icon={I.plus}>Новая</Btn></div>
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {[['','Все'],['act','Активные'],['dn','Завершённые']].map(([k,l])=><Tag key={k} text={l} bg={tkFlt===k?'var(--pri)':'rgba(60,168,168,.1)'} color={tkFlt===k?'#fff':'var(--pri)'} onClick={()=>sTkFlt(k)} style={{padding:'7px 14px',fontSize:12,cursor:'pointer'}}/>)}
      </div>
      {tks.filter(t=>tkFlt==='act'?!t.dn:tkFlt==='dn'?t.dn:true).sort((a,b)=>a.dn!==b.dn?a.dn?1:-1:new Date(a.d)-new Date(b.d)).map(t=>{const c=cls.find(x=>x.id===t.cid);
        return<Cd key={t.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,padding:14}}>
          <div onClick={()=>tog(t.id)} style={{width:24,height:24,borderRadius:6,border:t.dn?'none':'2px solid var(--brd)',background:t.dn?'var(--pri)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',flexShrink:0}}>{t.dn&&I.check}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,textDecoration:t.dn?'line-through':'none',color:t.dn?'var(--tx3)':'var(--tx)'}}>{t.t}</div><div style={{fontSize:12,color:'var(--tx3)'}}>{c&&c.n} — {fD(t.d)}</div></div>
          <Tag text={pN(t.p)} bg={pB(t.p)} color={pC(t.p)}/>
          <button onClick={()=>{sETk(t);sMTF(true)}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',display:'flex'}}>{I.edit}</button>
          <button onClick={()=>sConf({tp:'tk',id:t.id,nm:t.t})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',display:'flex'}}>{I.trash}</button>
        </Cd>})}
    </div>}

    {pg==='cal'&&<Cal tasks={tks} cls={cls} cts={cts}/>}
    {pg==='acts'&&<Acts acts={acts} setActs={sActs} cts={cts} cls={cls} show={show}/>}
    </div>

    {mCF&&<ClForm ini={eCl} onClose={()=>{sMCF(false);sECl(null)}} onSave={savCl}/>}
    {mCtF&&<CtForm ini={eCt} cid={ctCid||sel?.id} clients={cls} onClose={()=>{sMCtF(false);sECt(null);sCtCid(null)}} onSave={savCt} onNewClient={()=>sQuickNewCl(true)}/>}
    {quickNewCl&&<ClForm ini={null} onClose={()=>sQuickNewCl(false)} onSave={(c)=>{sCl([...cls,c]);sQuickNewCl(false);show('Клиент добавлен')}}/>}
    {mTF&&<TkForm ini={eTk} cls={cls} onClose={()=>{sMTF(false);sETk(null)}} onSave={savTk}/>}
    {conf&&<Confirm msg={`Удалить «${conf.nm}»?`} onNo={()=>sConf(null)} onYes={()=>{
      if(conf.tp==='cl'){sCl(cls.filter(x=>x.id!==conf.id));sCt(cts.filter(x=>x.cid!==conf.id));sTk(tks.filter(x=>x.cid!==conf.id));if(sel?.id===conf.id){sSel(null);sPg('cli')}show('Удалено')}
      else if(conf.tp==='ct'){sCt(cts.filter(x=>x.id!==conf.id));show('Договор удалён')}
      else{sTk(tks.filter(x=>x.id!==conf.id));show('Задача удалена')}sConf(null)}}/>}
    {toast&&<Toast msg={toast} onDone={()=>sToast(null)}/>}
  </div>;
}

/* ═══ Landing ═══ */
function Landing({onL,onR}){
  return<div style={{background:'var(--bg)'}}>
    <nav style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 28px',borderBottom:'1px solid var(--brd)',position:'sticky',top:0,background:'rgba(236,227,228,.95)',zIndex:100,backdropFilter:'blur(12px)'}}>
      <div style={{color:'var(--pri)'}}><VPLogo/></div>
      <div style={{display:'flex',gap:8}}><Btn ghost onClick={onL}>Войти</Btn><Btn primary onClick={onR}>Попробовать</Btn></div>
    </nav>
    <section style={{padding:'80px 24px 60px',textAlign:'center',position:'relative'}}>
      <div style={{position:'absolute',top:40,right:60,width:80,height:80,border:'2px solid var(--sec)',transform:'rotate(45deg)',borderRadius:4,opacity:.15}}/>
      <div style={{position:'absolute',bottom:30,left:40,width:50,height:50,background:'var(--acc)',transform:'rotate(45deg)',borderRadius:3,opacity:.12}}/>
      <div style={{position:'relative',zIndex:1,maxWidth:700,margin:'0 auto'}}>
        <div className="fi" style={{display:'inline-block',padding:'6px 16px',borderRadius:20,background:'rgba(60,168,168,.1)',color:'var(--pri)',fontSize:12,fontWeight:700,marginBottom:20,border:'1px solid rgba(60,168,168,.2)',letterSpacing:'.04em'}}>ДЛЯ СТРАХОВЫХ АГЕНТОВ</div>
        <h1 className="fi" style={{fontSize:42,lineHeight:1.15,marginBottom:18,color:'var(--pri)'}}>Договоры, комиссии и сверка<br/><span style={{color:'var(--sec)'}}>в одном месте</span></h1>
        <p className="fi" style={{fontSize:16,color:'var(--tx2)',lineHeight:1.7,maxWidth:520,margin:'0 auto 32px'}}>Взносы с напоминаниями, автосверка актов от СК, умный календарь. Уверенно, профессионально, надёжно.</p>
        <div className="fi" style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          <Btn primary onClick={onR} style={{padding:'14px 32px',fontSize:15,borderRadius:10}}>Начать бесплатно</Btn>
          <Btn accent onClick={onL} style={{padding:'14px 32px',fontSize:15,borderRadius:10,fontWeight:900}}>Демо-доступ</Btn>
        </div>
        <Sep/>
      </div>
    </section>
    <section style={{padding:'60px 24px',background:'#fff',borderTop:'1px solid var(--brd-lt)'}}>
      <div style={{maxWidth:950,margin:'0 auto'}}>
        <h2 style={{textAlign:'center',fontSize:28,marginBottom:8,color:'var(--pri)'}}>Возможности</h2>
        <div style={{display:'flex',justifyContent:'center',marginBottom:32}}><div style={{width:8,height:8,background:'var(--sec)',transform:'rotate(45deg)',borderRadius:1}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:14}}>
          {[[I.users,'Карточки клиентов','Контакты, дни рождения, история договоров'],[I.doc,'Несколько договоров','У каждого клиента — свой список полисов'],[I.coin,'Взносы и комиссии','До 4 взносов, автоматический расчёт КВ'],[I.cal,'Умный календарь','Взносы, окончания, дни рождения'],[I.clip,'Автосверка актов','Загрузка Excel от СК и сопоставление'],[I.car,'Типы объектов','Авто, недвижимость, жизнь — разные поля']].map(([ic,ti,de],i)=>(
            <Cd key={i} style={{padding:24}}><div style={{color:'var(--sec)',marginBottom:10}}>{ic}</div><h3 style={{fontSize:15,color:'var(--pri)',marginBottom:4}}>{ti}</h3><p style={{color:'var(--tx2)',fontSize:13,margin:0,lineHeight:1.6}}>{de}</p></Cd>))}
        </div>
      </div>
    </section>
    <footer style={{padding:28,textAlign:'center',borderTop:'1px solid var(--brd)',color:'var(--tx3)',fontSize:12}}>
      <div style={{display:'flex',justifyContent:'center',marginBottom:8}}><div style={{width:6,height:6,background:'var(--sec)',transform:'rotate(45deg)',borderRadius:1}}/></div>
      2026 АгентСфера — Уверенно, профессионально, надёжно
    </footer>
  </div>;
}

/* ═══ Auth ═══ */
function Auth({mode,onSw,onOk,onBk}){const il=mode==='login';
  const[name,sName]=useState('');const[email,sEmail]=useState('');
  return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
    <div style={{width:'100%',maxWidth:400,padding:24}}>
      <button onClick={onBk} style={{background:'none',border:'none',color:'var(--tx2)',cursor:'pointer',fontSize:14,marginBottom:20,fontFamily:'inherit',display:'flex',alignItems:'center',gap:4}}>{I.chL} Назад</button>
      <div className="su" style={{background:'#fff',borderRadius:16,padding:32,border:'1px solid var(--brd-lt)',boxShadow:'var(--sh-lg)'}}>
        <div style={{color:'var(--pri)',marginBottom:26}}><VPLogo/></div>
        <h2 style={{fontSize:22,marginBottom:20,color:'var(--pri)'}}>{il?'Вход':'Регистрация'}</h2>
        {!il&&<div style={{marginBottom:12}}><input value={name} onChange={e=>sName(e.target.value)} placeholder="Ваше имя *"/></div>}
        <div style={{marginBottom:12}}><input value={email} onChange={e=>sEmail(e.target.value)} placeholder="Email"/></div>
        <div style={{marginBottom:18}}><input type="password" placeholder="Пароль"/></div>
        <button onClick={()=>onOk(il?(email.split('@')[0]||'Агент'):name||'Агент')} style={{width:'100%',padding:12,border:'none',borderRadius:10,background:'var(--pri)',color:'#fff',cursor:'pointer',fontWeight:700,marginBottom:16,fontFamily:'inherit',fontSize:14}}>{il?'Войти':'Создать'}</button>
        <p style={{textAlign:'center',fontSize:12,color:'var(--tx3)'}}>{il?'Нет аккаунта? ':'Есть? '}<span onClick={onSw} style={{color:'var(--sec)',cursor:'pointer',fontWeight:700}}>{il?'Регистрация':'Войти'}</span></p>
      </div>
    </div>
  </div>;
}

function App(){const[scr,sScr]=useState('land');const[am,sAm]=useState('login');const[userName,sUserName]=useState('');
  if(scr==='land')return<Landing onL={()=>{sAm('login');sScr('auth')}} onR={()=>{sAm('reg');sScr('auth')}}/>;
  if(scr==='auth')return<Auth mode={am} onSw={()=>sAm(am==='login'?'reg':'login')} onOk={(n)=>{sUserName(n);sScr('crm')}} onBk={()=>sScr('land')}/>;
  return<Crm onOut={()=>sScr('land')} userName={userName}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
